<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A & D | The Boiling Point</title>
    <style>
        :root {
            --bp-red: #c64c38;
            --bp-yellow: #ffcc00;
            --neon-magenta: #ff00ff;
            --dark-bg: #000;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Arial Black', Gadget, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        .nav-bar {
            background-color: var(--bp-red);
            padding: 15px 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-left { display: flex; align-items: center; }
        .logo-text { font-size: 20px; margin-right: 40px; color: white; text-decoration: none; }

        .nav-tabs { display: flex; gap: 30px; }

        .tab-link {
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 14px;
            cursor: pointer;
            background: none;
            border: none;
            font-family: 'Arial Black';
            padding: 5px 0;
            transition: 0.3s;
            border-bottom: 2px solid transparent;
        }

        .tab-link:hover, .tab-link.active { 
            color: var(--bp-yellow); 
            border-bottom: 2px solid var(--bp-yellow);
        }

        /* --- HEADER SECTION --- */
        .page-header {
            height: 35vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.9)), 
                        url('609994335d769a2623726f24_mala thumbnail.jpg') center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .page-header h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            text-transform: uppercase;
            letter-spacing: 12px;
            margin: 0;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* --- GRID --- */
        .menu-section {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 50px 30px;
        }

        .item {
            text-align: center;
            transition: transform 0.3s ease;
        }

        .item:hover { transform: translateY(-8px); }

        .img-box {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: 15px;
            margin-bottom: 15px;
            background-color: #111;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item h3 {
            margin: 10px 0 5px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .price {
            color: var(--neon-magenta);
            font-size: 1.2rem;
            font-weight: bold;
        }

        footer { text-align: center; padding: 60px; opacity: 0.4; font-size: 0.8rem; }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <div class="nav-left">
            <a href="index.html" class="logo-text">LOGO</a>
            <div class="nav-tabs">
                <a href="index.html" class="tab-link">Home</a>
                <a href="menu.html" class="tab-link">Menu</a>
                <a href="about.html" class="tab-link">About Us</a>
                <a href="ad.html" class="tab-link active">A & D</a>
            </div>
        </div>
    </nav>

    <header class="page-header">
        <h1>Appetizers & Drinks</h1>
    </header>

    <section class="menu-section">
        <div class="grid">
            <div class="item">
                <div class="img-box"><img src="shrimp.jpg" alt="Fried Shrimp"></div>
                <h3>Fried Shrimp</h3>
                <span class="price">$8.00</span>
            </div>

            <div class="item">
                <div class="img-box"><img src="fries.jpg" alt="French Fries"></div>
                <h3>French Fries</h3>
                <span class="price">$5.00</span>
            </div>

            <div class="item">
                <div class="img-box"><img src="marcoon.jpg" alt="Macaroon"></div>
                <h3>Macaroon</h3>
                <span class="price">$4.00</span>
            </div>

            <div class="item">
                <div class="img-box"><img src="boba.jpg" alt="House Boba Milk Tea"></div>
                <h3>House Boba Milk Tea</h3>
                <span class="price">$5.50</span>
            </div>

            <div class="item">
                <div class="img-box"><img src="boba2.jpg" alt="Specialty Boba"></div>
                <h3>Specialty Boba</h3>
                <span class="price">$6.00</span>
            </div>

            <div class="item">
                <div class="img-box"><img src="che.jpg" alt="Che Dessert"></div>
                <h3>Che Dessert</h3>
                <span class="price">$7.00</span>
            </div>

            <div class="item">
                <div class="img-box"><img src="soju.jpg" alt="Soju"></div>
                <h3>Soju Item</h3>
                <span class="price">$5.00</span>
            </div>

            <div class="item">
                <div class="img-box"><img src="heineken.jpg" alt="Heineken"></div>
                <h3>Heineken</h3>
                <span class="price">$4.50</span>
            </div>

            <div class="item">
                <div class="img-box"><img src="coffe.jpg" alt="House Coffee Jello"></div>
                <h3>House Coffee Jello</h3>
                <span class="price">$4.50</span>
            </div>
        </div>
    </section>

    <footer>&copy; 2026 THE BOILING POINT</footer>

</body>
</html>
