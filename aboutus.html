<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us | The Boiling Point</title>
    <style>
        :root {
            --bp-red: #c64c38;
            --bp-yellow: #ffcc00;
            --dark-bg: #000;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Arial Black', Gadget, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            overflow-x: hidden;
        }

        /* --- NAVIGATION (Tab Switching) --- */
        .nav-bar {
            background-color: var(--bp-red);
            padding: 15px 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-content { display: flex; align-items: center; width: 100%; }
        .logo-text { font-size: 20px; color: white; text-decoration: none; margin-right: 40px; }
        .menu-links { display: flex; gap: 30px; }

        .nav-link {
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 14px;
            padding: 5px 0;
            transition: 0.3s;
            border-bottom: 2px solid transparent;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--bp-yellow);
            border-bottom: 2px solid var(--bp-yellow);
        }

        /* --- BLACK CONTACT SECTION --- */
        .contact-container {
            background-color: #000; /* Pure black to match your other pages */
            padding: 100px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            min-height: 80vh;
        }

        .contact-container h1 {
            font-size: clamp(3rem, 10vw, 5rem);
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .contact-form {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* The "Bigger" clean inputs from your screenshot */
        .contact-form input, 
        .contact-form textarea {
            width: 100%;
            padding: 22px;
            font-size: 1.1rem;
            border: 1px solid #333; /* Dark border for black background */
            border-radius: 4px;
            background-color: #fff;
            color: #000;
            font-family: 'Arial', sans-serif;
            box-sizing: border-box;
        }

        .contact-form textarea {
            min-height: 200px;
            resize: none;
        }

        /* Big Send Button */
        .send-btn {
            width: 100%;
            padding: 22px;
            font-size: 1.4rem;
            background-color: #e0e0e0;
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Arial Black', sans-serif;
            text-transform: uppercase;
            transition: 0.3s;
            margin-top: 10px;
        }

        .send-btn:hover {
            background-color: var(--bp-yellow);
            transform: scale(1.02);
        }

        /* --- INFO SECTION --- */
        .info-grid {
            max-width: 1000px;
            margin: 0 auto 100px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
        }

        .info-item h3 {
            color: var(--bp-red);
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .info-item p {
            color: #888;
            line-height: 1.6;
            font-family: Arial, sans-serif;
        }

        footer {
            text-align: center;
            padding: 60px;
            opacity: 0.3;
            font-size: 0.8rem;
            border-top: 1px solid #111;
        }

        @media (max-width: 768px) {
            .info-grid { grid-template-columns: 1fr; }
            .nav-bar { padding: 15px 20px; }
        }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <div class="nav-content">
            <a href="index.html" class="logo-text">BOILING POINT</a>
            <div class="menu-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="menu.html" class="nav-link">Menu</a>
                <a href="aboutus.html" class="nav-link active">About Us</a>
                <a href="d&a.html" class="nav-link">A & D</a>
            </div>
        </div>
    </nav>

    <section class="contact-container">
        <h1>Get In Touch</h1>
        
        <form class="contact-form" action="#">
            <input type="text" placeholder="Name" required>
            <input type="email" placeholder="Email" required>
            <textarea placeholder="Message" required></textarea>
            <button type="submit" class="send-btn">Send</button>
        </form>
    </section>

    <section class="info-grid">
        <div class="info-item">
            <h3>Our Location</h3>
            <p>123 Brookhurst Street<br>Garden Grove, CA 82460</p>
        </div>
        <div class="info-item">
            <h3>Contact Info</h3>
            <p><strong>Gmail:</strong> info@boilingpoint.com<br><strong>Phone:</strong> (555) 123-4567</p>
        </div>
    </section>

    <footer>&copy; 2026 THE BOILING POINT</footer>

</body>
</html>
